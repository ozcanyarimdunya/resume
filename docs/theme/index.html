<!DOCTYPE html>
<html lang="en">
<head>
  <title>{{ page.title }}</title>
  <meta charset="utf-8">
  <meta http-equiv="X-UA-Compatible" content="IE=edge">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="{{ config.site_author }}">
  <link rel="shortcut icon" href="{{ config.theme.favicon|url }}">
  <style>
    html, body {
      margin: 0;
      padding: 0;
      font-family: monospace;
      font-size: 1.05em;
    }

    a {
      text-decoration: none;
    }

    code {
      background: #e5e5e5;
      padding: 0.2rem 0.4rem;
      border-radius: 0.35rem;
      font-size: 0.9em;
    }

    .btn-container {
      position: sticky;
      top: 2vh;
      text-align: end;
    }

    .btn-download {
      color: #24292F;
      padding: 0.25rem 0.5rem;
      border: 0.1rem solid #24292F;
      border-radius: 0.2rem;
      font-size: 1rem;
    }

    .btn-download:hover {
      background-color: #F7F7F7;
    }

    .btn-download svg {
      vertical-align: -0.2rem;
    }

    .hidden {
      display: none;
    }

    @media screen and (max-width: 800px) {
      body {
        padding: 0 1em;
      }
    }

    @media screen and (min-width: 801px) and (max-width: 1200px) {
      body {
        padding: 0 5em;
      }
    }

    @media screen and (min-width: 1201px) and (max-width: 1400px) {
      body {
        padding: 0 10em;
      }
    }

    @media screen and (min-width: 1400px) {
      body {
        padding: 0 20em;
      }
    }
  </style>
</head>
<body>
<!--download-->
<div class="btn-container">
  <a class="btn-download" href="https://github.com/ozcanyarimdunya/resume/releases/latest/download/ozcanyarimdunya.pdf">
    <svg viewBox="0 0 16 16" width="16" height="16">
      <path fill-rule="evenodd"
            d="M7.47 10.78a.75.75 0 001.06 0l3.75-3.75a.75.75 0 00-1.06-1.06L8.75 8.44V1.75a.75.75 0 00-1.5 0v6.69L4.78 5.97a.75.75 0 00-1.06 1.06l3.75 3.75zM3.75 13a.75.75 0 000 1.5h8.5a.75.75 0 000-1.5h-8.5z">
      </path>
    </svg>
    Download
  </a>
</div>
<!--/download-->
{{page.content}}
</body>
</html>
