name: Deploy resume

on:
  push:
    branches: [ master ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up Python 3.10
        uses: actions/setup-python@v2
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: make install
      - name: Build mkdocs
        run: make build
      - name: Convert resume to pdf
        uses: fifsky/html-to-pdf-action@master
        with:
          htmlFile: ./site/index.html
          outputFile: ./theme/assets/resume.pdf
          pdfOptions: '{"format": "A4", "margin": {"top": "1mm", "left": "1mm", "right": "1mm", "bottom": "1mm"}}'
      - name: Publish to GitHub pages
        run: make publish
